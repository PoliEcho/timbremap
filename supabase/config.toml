project_id = "musiccompas"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

# Local email testing inbox (magic links / confirmations land here)
[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000", "http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
# Require users to confirm their email before they can sign in. Locally, the
# confirmation email is captured by Inbucket (http://localhost:54324).
enable_confirmations = true

# Google OAuth. Create credentials at https://console.cloud.google.com/apis/credentials
# (Authorized redirect URI: <SUPABASE_URL>/auth/v1/callback). Set the two env vars
# below before `supabase start` for local OAuth; in hosted Supabase, configure the
# provider under Authentication → Providers instead.
[auth.external.google]
enabled = true
client_id = "env(SUPABASE_AUTH_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_GOOGLE_SECRET)"

[analytics]
enabled = false
